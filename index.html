<html>
  <head>
    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Smythe&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="header-container">
        <div>
          <h1 class="header-title">Jimmy's Diner</h1>
          <p class="header-subtitle">The best burgers and pizzas in town.</p>
        </div>
      </div>
    </header>
    <main>
      <div class="main-container">
        <ul class="list"></ul>
      </div>
      <section class="cart-container">
        <h3 class="cart-title">Your order</h3>
        <div class="cart"></div>
        </div>
        <div class="total-price-wrapper">
        <p id="cart-price">Total price:</p>
        <p id="total-price"></p>
        </div>
        <button class="cart-btn">Complete order</button>
      </section>
    </main>
    <script src="index.js" type="module"></script>
  </body>
